<style>

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0a0a0b;
    color: #e4e4e7;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .lock-screen {
    text-align: center;
    max-width: 380px;
    padding: 40px;
  }
  .lock-screen h1 {
    font-family: 'Newsreader', Georgia, serif;
    font-size: 2rem;
    font-weight: 500;
    color: #fff;
    margin-bottom: 8px;
  }
  .lock-screen p {
    font-size: 0.85rem;
    color: #71717a;
    margin-bottom: 32px;
  }
  .lock-screen input {
    width: 100%;
    padding: 14px 20px;
    background: #111113;
    border: 1px solid #222228;
    border-radius: 10px;
    color: #e4e4e7;
    font-size: 1rem;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.2s;
    text-align: center;
    letter-spacing: 0.15em;
  }
  .lock-screen input:focus {
    border-color: #818cf8;
  }
  .lock-screen input::placeholder {
    color: #52525b;
    letter-spacing: 0.05em;
  }
  .lock-screen button {
    width: 100%;
    margin-top: 16px;
    padding: 14px 20px;
    background: #818cf8;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 0.9rem;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: background 0.2s;
  }
  .lock-screen button:hover {
    background: #6366f1;
  }
  .lock-icon {
    width: 48px;
    height: 48px;
    border-radius: 14px;
    background: rgba(129, 140, 248, 0.12);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    font-size: 1.4rem;
  }
  .error-msg {
    color: #f87171;
    font-size: 0.8rem;
    margin-top: 12px;
    min-height: 20px;
  }
  .loading {
    color: #818cf8;
    font-size: 0.8rem;
    margin-top: 12px;
  }
</style>

function b64ToArr(b64) {
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return arr;
}

async function unlock(e) {
  e.preventDefault();
  const pw = document.getElementById('pw').value;
  const errEl = document.getElementById('error');
  errEl.textContent = '';
  errEl.className = 'loading';
  errEl.textContent = 'Decrypting...';

  try {
    const enc = new TextEncoder();
    const salt = b64ToArr(SALT);
    const iv = b64ToArr(IV);
    const data = b64ToArr(DATA);

    const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(pw), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
      keyMaterial,
      { name: 'AES-GCM', length: 256 },
      false,
      ['decrypt']
    );
    const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, data);
    const html = new TextDecoder().decode(decrypted);

    // Inject the full original head styles + body

  .sidebar-footer {
    margin-top: auto;
    padding: 16px 24px;
    border-top: 1px solid var(--border);
  }

  .sidebar-footer p {
    font-size: 0.7rem;
    color: var(--text-dim);
    line-height: 1.5;
  }

  /* TOC */
  .toc-list {
    padding: 0 24px;
    margin-top: 4px;
  }

  .toc-item {
    display: block;
    padding: 4px 0 4px 16px;
    font-size: 0.75rem;
    color: var(--text-dim);
    cursor: pointer;
    transition: color 0.15s;
    border-left: 1px solid var(--border);
    text-decoration: none;
  }

  .toc-item:hover {
    color: var(--text-muted);
  }

  /* Main content */
  .main {
    margin-left: 280px;
    flex: 1;
    min-height: 100vh;
  }

  .doc-container {
    display: none;
    max-width: 780px;
    margin: 0 auto;
    padding: 60px 48px 120px;
  }

  .doc-container.active {
    display: block;
  }

  /* Typography */
  .doc-container h1 {
    font-family: 'Newsreader', Georgia, serif;
    font-size: 2.5rem;
    font-weight: 500;
    line-height: 1.2;
    margin-bottom: 8px;
    color: #fff;
  }

  .doc-container h2 {
    font-family: 'Newsreader', Georgia, serif;
    font-size: 1.6rem;
    font-weight: 500;
    line-height: 1.3;
    margin-top: 56px;
    margin-bottom: 20px;
    color: #fff;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .doc-container h3 {
    font-size: 1.05rem;
    font-weight: 600;
    margin-top: 36px;
    margin-bottom: 12px;
    color: var(--accent);
    letter-spacing: 0.01em;
  }

  .doc-container h4 {
    font-size: 0.9rem;
    font-weight: 600;
    margin-top: 24px;
    margin-bottom: 8px;
    color: var(--text);
  }

  .doc-subtitle {
    font-size: 0.9rem;
    color: var(--text-dim);
    font-style: italic;
    margin-bottom: 48px;
  }

  .doc-container p {
    margin-bottom: 16px;
    color: var(--text);
  }

  .doc-container strong {
    color: #fff;
    font-weight: 600;
  }

  .doc-container em {
    font-family: 'Newsreader', Georgia, serif;
    font-style: italic;
    color: var(--text);
  }

  .doc-container ul, .doc-container ol {
    margin-bottom: 16px;
    padding-left: 24px;
  }

  .doc-container li {
    margin-bottom: 6px;
    color: var(--text);
  }

  .doc-container li::marker {
    color: var(--text-dim);
  }

  .doc-container a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color 0.15s;
  }

  .doc-container a:hover {
    border-bottom-color: var(--accent);
  }

  /* Blockquotes — used for pitch scripts */
  .doc-container blockquote {
    border-left: 3px solid var(--accent);
    background: var(--accent-glow);
    padding: 20px 24px;
    margin: 20px 0;
    border-radius: 0 8px 8px 0;
    font-family: 'Newsreader', Georgia, serif;
    font-size: 1.02rem;
    line-height: 1.75;
    color: var(--text);
  }

  .doc-container blockquote p:last-child {
    margin-bottom: 0;
  }

  .doc-container blockquote strong {
    color: var(--accent);
  }

  /* Code blocks */
  .doc-container code {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.85em;
    background: var(--bg-hover);
    padding: 2px 6px;
    border-radius: 4px;
    color: var(--green);
  }

  .doc-container pre {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px 24px;
    overflow-x: auto;
    margin: 16px 0;
    font-size: 0.85rem;
    line-height: 1.6;
  }

  .doc-container pre code {
    background: none;
    padding: 0;
    color: var(--text-muted);
  }

  /* Tables */
  .doc-container table {
    width: 100%;
    border-collapse: collapse;
    margin: 20px 0;
    font-size: 0.875rem;
  }

  .doc-container thead th {
    text-align: left;
    padding: 10px 14px;
    background: var(--bg-card);
    border-bottom: 2px solid var(--border);
    font-weight: 600;
    font-size: 0.8rem;
    letter-spacing: 0.03em;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .doc-container tbody td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
    line-height: 1.5;
  }

  .doc-container tbody tr:hover {
    background: var(--bg-hover);
  }

  /* Horizontal rule — section dividers */
  .doc-container hr {
    border: none;
    height: 1px;
    background: var(--border);
    margin: 48px 0;
  }

  /* Special callout boxes */
  .callout {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 24px;
    margin: 20px 0;
  }

  .callout-accent {
    border-color: var(--accent);
    background: var(--accent-glow);
  }

  /* Section number pills for the narrative */
  .section-num {
    display: inline-block;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--accent);
    background: var(--accent-glow);
    padding: 4px 10px;
    border-radius: 100px;
    margin-bottom: 20px;
    text-transform: uppercase;
  }

  /* Cheat sheet grid */
  .cheat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin: 20px 0;
  }

  .cheat-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
  }

  .cheat-card h4 {
    margin-top: 0;
    margin-bottom: 12px;
    font-size: 1rem;
  }

  .cheat-card.hans { border-top: 3px solid var(--accent); }
  .cheat-card.oren { border-top: 3px solid var(--orange); }
  .cheat-card.cami { border-top: 3px solid var(--green); }

  /* Progress bar at top */
  .reading-progress {
    position: fixed;
    top: 0;
    left: 280px;
    right: 0;
    height: 2px;
    background: var(--bg);
    z-index: 99;
  }

  .reading-progress-bar {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.1s;
  }

  /* Mobile */
  @media (max-width: 900px) {
    .sidebar {
      width: 100%;
      height: auto;
      position: relative;
      border-right: none;
      border-bottom: 1px solid var(--border);
      padding: 16px 0;
    }

    .main {
      margin-left: 0;
    }

    .doc-container {
      padding: 32px 20px 80px;
    }

    .reading-progress { left: 0; }
    .toc-list { display: none; }
    .sidebar-footer { display: none; }

    .cheat-grid { grid-template-columns: 1fr; }
  }

  /* Scroll fade in */
  .fade-section {
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }

  .fade-section.visible {
    opacity: 1;
    transform: translateY(0);
  }
</style>
